<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode Active</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0e0e10 0%, #1a1a1d 100%);
      color: #e8e4df;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      background: #17171a;
      border: 2px solid rgba(201, 168, 76, 0.4);
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #c9a84c;
      margin-bottom: 16px;
    }
    p {
      font-size: 1rem;
      color: #9d9a95;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .action {
      display: inline-block;
      background: #c9a84c;
      color: #0e0e10;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s;
    }
    .action:hover { transform: translateY(-2px); }
    .badge {
      display: inline-block;
      background: rgba(201, 168, 76, 0.15);
      color: #c9a84c;
      border: 1px solid rgba(201, 168, 76, 0.3);
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Focus Mode Active</h1>
    <p>This site is blocked while your JEE focus session is running. Return to your study dashboard to continue preparation.</p>
    <a href="https://somyal.github.io/Study-website/" class="action">Return to JEE Prep →</a>
    <div class="badge">JEE Focus Shield</div>
  </div>
</body>
</html>
