<style>
:root {
  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --gold: #c9a84c;
  --gold-hover: #b8963a;
  --gold-muted: rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.3);
  --info: #5b8fa8;
  --success: #4a9e7a;
  --warning: #c47a2b;
  --error: #b85450;
  --radius: 1rem;
  --radius-sm: 0.75rem;
  --radius-xs: 0.5rem;
  --transition: 0.25s;
}
html.dark {
  --bg: #0b0d12;
  --bg-c: #13161e;
  --bg-c2: #1a1e2a;
  --bg-c3: #242836;
  --b: #2a2f3e;
  --bh: #3a4055;
  --tp: #e8eaf0;
  --ts: #a0a5b8;
  --tm: #6b7085;
}
html.light {
  --bg: #f8fafc;
  --bg-c: #ffffff;
  --bg-c2: #f1f5f9;
  --bg-c3: #e2e8f0;
  --b: #cbd5e1;
  --bh: #94a3b8;
  --tp: #0f172a;
  --ts: #334155;
  --tm: #64748b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tp);transition:background var(--transition),color var(--transition);min-height:100vh;overflow-x:hidden}
body,.card,.cc,.inp,.acc-h,.chip{transition:background-color var(--transition),border-color var(--transition),color var(--transition),box-shadow var(--transition)}
.mono{font-family:var(--mono)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popCheck{0%{transform:scale(0.8)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
@keyframes ping{0%{transform:scale(1);opacity:1}75%{transform:scale(1.5);opacity:0}100%{transform:scale(1.5);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes particle{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tp{animation:fadeInUp 0.3s ease-out}
.stc{width:1.25rem;height:1.25rem;border-radius:0.375rem;border:2px solid var(--b);background:var(--bg-c2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}

html.light .stc:hover{border-color:#64748b;transform:scale(1.08)}
.stc.checked{background:var(--gold);border-color:var(--gold)}
.stc.checked.ct{background:#0284c7;border-color:#0284c7;box-shadow:0 0 8px rgba(2,132,199,0.4)}
.stc.checked.cd{background:#7c3aed;border-color:#7c3aed;box-shadow:0 0 8px rgba(124,58,237,0.4)}
.stc.checked.cp{background:#d97706;border-color:#d97706;box-shadow:0 0 8px rgba(217,119,6,0.4)}
.stc.checked.cr{background:#059669;border-color:#059669;box-shadow:0 0 8px rgba(5,150,105,0.4)}
.stc.checked svg{color:#fff;width:0.75rem;height:0.75rem}
.card{background:var(--bg-c);border:1px solid var(--b);border-radius:var(--radius);transition:all var(--transition)}
.card:hover{transform:translateY(-2px);border-color:var(--bh);box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.cc{background:var(--bg-c2);border:1px solid var(--b);border-radius:var(--radius-sm)}
.inp{background:var(--bg-c2);border:1px solid var(--b);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.75rem;color:var(--tp);outline:none;width:100%;font-family:var(--mono)}
.inp:focus{border-color:var(--gold)}
.acc-h{background:var(--bg-c2);border-bottom:1px solid var(--b);padding:0.75rem 1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.acc-h:hover{background:var(--bg-c3)}
.chip{display:inline-flex;align-items:center;gap:0.25rem;padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.625rem;font-weight:700;border:1px solid var(--b);background:var(--bg-c2);color:var(--ts)}
.chip.active{background:var(--gold-muted);color:var(--gold);border-color:var(--gold-border)}
.btn-gold{background:var(--gold);color:var(--bg);font-weight:700;font-size:0.75rem;padding:0.5rem 1.25rem;border-radius:var(--radius-sm);border:none;cursor:pointer}
.btn-gold:hover{background:var(--gold-hover)}
.btn-ghost{background:var(--bg-c2);border:1px solid var(--b);color:var(--ts);font-weight:700;font-size:0.75rem;padding:0.5rem 1rem;border-radius:var(--radius-sm);cursor:pointer}
.btn-ghost:hover{border-color:var(--bh);color:var(--tp)}
.btn-danger{background:rgba(184,84,80,0.15);border:1px solid var(--error);color:var(--error);font-weight:700;font-size:0.75rem;padding:0.5rem 1rem;border-radius:var(--radius-sm);cursor:pointer}
.btn-danger:hover{background:rgba(184,84,80,0.25)}
.scrollbar-thin::-webkit-scrollbar{width:4px}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
.modal-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-content{background:var(--bg-c);border:1px solid var(--b);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:32rem;max-height:90vh;overflow-y:auto}
.particle{position:fixed;pointer-events:none;z-index:100;font-size:1.25rem;animation:particle 1s ease-out forwards}
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:60;display:flex;flex-direction:column;gap:0.5rem;max-width:24rem}
.toast{background:var(--bg-c);border:1px solid var(--b);border-radius:var(--radius-sm);padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:slideUp 0.3s ease-out;font-size:0.75rem;font-weight:600}
.toast .undo-btn{color:var(--gold);cursor:pointer;font-weight:700;text-decoration:underline;background:none;border:none;font-size:0.7rem;white-space:nowrap}
</style>

function chapterMatchesSearch(name,query){
if(!query)return true;const q=query.trim().toLowerCase(),nl=name.toLowerCase();
if(nl.includes(q))return true;

}

function getLocalDateString(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function calcChapterPct(chId,state){
const cd=state.chapters[chId];if(!cd||!cd.stages)return 0;let p=0;
if(cd.stages.theory)p+=25;if(cd.stages.dpp)p+=25;if(cd.stages.revision)p+=25;
const shifts=PYQ_SHIFT_KEYS;
if(cd.pyqShifts&&Object.keys(cd.pyqShifts).length>0){const s=shifts.filter(s=>!!cd.pyqShifts[s]).length;p+=Math.round((s/shifts.length)*25)}
else if(cd.stages.pyq)p+=25;
return Math.min(100,Math.round(p));
}
function calcSubjectPct(sub,state){
const chs=sub==='physics'?PHYSICS_CHAPTERS:sub==='chemistry'?CHEMISTRY_CHAPTERS:MATHEMATICS_CHAPTERS;
if(!chs.length)return 0;const pcts=chs.map(ch=>calcChapterPct(ch.id,state));return Math.round(pcts.reduce((a,b)=>a+b,0)/chs.length);
}
function calcOverallPct(state){return Math.round((calcSubjectPct('physics',state)+calcSubjectPct('chemistry',state)+calcSubjectPct('mathematics',state))/3)}
function getPyqSolvedCount(chId,state){
const cd=state.chapters[chId],shifts=PYQ_SHIFT_KEYS,total=shifts.length;
if(!cd||!cd.pyqShifts)return{solved:cd?.stages?.pyq?total:0,total};
return{solved:shifts.filter(s=>!!cd.pyqShifts[s]).length,total};
}
function getSpacedRevisionStatus(chId,state){
const cd=state.chapters[chId];
if(!cd||!cd.stages||!cd.stages.revision||!cd.revisionDates||!cd.revisionDates.length)return{isDue:false,daysSinceLast:null,color:'green',text:'Not revised yet'};
const diff=Math.floor((Date.now()-new Date(cd.revisionDates[cd.revisionDates.length-1]).getTime())/86400000);
if(diff<=7)return{isDue:false,daysSinceLast:diff,color:'green',text:'Fresh ('+diff+'d ago)'};
if(diff<=21)return{isDue:false,daysSinceLast:diff,color:'amber',text:'Review Soon ('+diff+'d ago)'};
return{isDue:true,daysSinceLast:diff,color:'red',text:'Due for Revision ('+diff+'d ago)'};
}
function getWeakChapters(state){
const weak=[];ALL_CHAPTERS.forEach(ch=>{const cd=state.chapters[ch.id];
if(cd){if(cd.backlog)weak.push({chId:ch.id,reason:'Flagged in Backlog'});
else if(cd.stars>0&&cd.stars<=2)weak.push({chId:ch.id,reason:'Low confidence ('+cd.stars+'\u2605)'});
else if(ch.weight==='High'&&calcChapterPct(ch.id,state)<50)weak.push({chId:ch.id,reason:'High weightage <50% completion'})}});
return weak;

h+='<span class="chip">'+ch.weight+' Weightage</span>';
if(rev.isDue)h+='<span class="chip" style="background:rgba(184,84,80,0.12);color:var(--error)">Due Revision ('+rev.daysSinceLast+'d ago)</span>';
h+='</div><div class="flex items-center gap-3">';
h+='<span class="mono text-xs font-bold" style="color:var(--gold)">'+pct+'%</span>';
h+='<button onclick="toggleBacklog(\''+ch.id+'\');renderApp()" class="chip'+(cd.backlog?' active':'')+'">\uD83D\uDCCC '+(cd.backlog?'\u2713 Backlog':'+ Backlog')+'</button>';
h+='</div></div>';
h+='<div class="flex items-center gap-2 mb-3"><span class="text-[11px] font-semibold" style="color:var(--tm)">Confidence:</span><div class="flex items-center gap-1">';
for(let s=1;s<=5;s++)h+='<button onclick="setStars(\''+ch.id+'\','+s+');renderApp()" style="color:'+(s<=cd.stars?'var(--warning)':'var(--b)')+'">'+(s<=cd.stars?'\u2605':'\u2606')+'</button>';
h+='</div></div>';
h+='<div class="grid grid-cols-2 sm:grid-cols-4 gap-2">';
['theory','dpp','pyq','revision'].forEach(function(st){
var icon={'theory':'\uD83D\uDCD6','dpp':'\uD83D\uDCDD','pyq':'\uD83C\uDFC6','revision':'\uD83D\uDD04'}[st];
var label={'theory':'Theory','dpp':'DPPs','pyq':'PYQs ('+pyq.solved+'/'+pyq.total+')','revision':'Revision'}[st];
var cls={'theory':'ct','dpp':'cd','pyq':'cp','revision':'cr'}[st];
var onclick=(st==='pyq'?'activePyqChapterId="'+ch.id+'";renderApp()':'toggleStage("'+ch.id+'","'+st+'");renderApp();showToast("'+label+' done! +50 XP","emerald")');
h+='<button onclick="'+onclick+'" class="px-3 py-2 rounded-xl border flex items-center justify-between text-xs font-semibold" style="'+(cd.stages[st]?'background:var(--gold-muted);color:var(--gold);border-color:var(--gold-border)':'background:var(--bg-c3);color:var(--ts);border-color:var(--b)')+'"><div class="flex items-center gap-1.5"><span>'+icon+'</span><span>'+label+'</span></div><div class="stc'+(cd.stages[st]?' checked '+cls:'')+'">'+(cd.stages[st]?'\u2713':'')+'</div></button>';
});
h+='</div>';
h+='<div class="mt-2"><button onclick="toggleFormulaDrawer(\''+ch.id+'\')" class="text-[10px] font-bold" style="color:var(--ts)">\uD83D\uDCDD Formula Notes '+(cd._formulaOpen?'\u25B2':'\u25BC')+'</button>';

}

h+='</div>';
h+='<div class="card p-4 flex flex-wrap items-center justify-between gap-4"><div class="relative flex-1 min-w-[200px]"><span style="position:absolute;left:0.75rem;top:0.65rem;font-size:0.75rem">\uD83D\uDD0D</span><input class="inp pl-8" value="'+searchQuery+'" oninput="searchQuery=this.value;renderApp()" placeholder="Search chapters..." style="color:var(--tp)"></div>';
h+='<div class="flex items-center gap-2 flex-wrap text-xs"><span class="text-[10px] font-bold uppercase" style="color:var(--tm)">Class:</span>';
['all','11','12'].forEach(function(v){h+='<button onclick="classFilter=\''+v+'\';renderApp()" class="chip'+(classFilter===v?' active':'')+'">'+(v==='all'?'All':'Class '+v)+'</button>';});
h+='<span class="text-[10px] font-bold uppercase ml-2" style="color:var(--tm)">Weight:</span>';
['all','High','Medium','Low'].forEach(function(v){h+='<button onclick="weightFilter=\''+v+'\';renderApp()" class="chip'+(weightFilter===v?' active':'')+'">'+(v==='all'?'All':v)+'</button>';});
h+='<button onclick="backlogFilter=!backlogFilter;renderApp()" class="chip'+(backlogFilter?' active':'')+'">\uD83D\uDCCC Backlog</button></div></div>';
if(filtered.length>0){h+='<div class="card p-3 flex items-center justify-between gap-3 flex-wrap"><span class="text-xs font-bold" style="color:var(--ts)">Bulk Actions</span><div class="flex items-center gap-2"><button onclick="bulkMark(\'theory\')" class="btn-gold text-[10px] px-2.5 py-1">Mark All Theory</button><button onclick="bulkMark(\'dpp\')" class="btn-gold text-[10px] px-2.5 py-1">Mark All DPPs</button><button onclick="bulkClearBacklog()" class="btn-ghost text-[10px] px-2.5 py-1">Clear Backlogs</button></div></div>';}
h+='<div class="space-y-4">';
if(Object.keys(groups).length===0){h+='<div class="p-12 text-center text-sm rounded-2xl" style="background:var(--bg-c);border:1px solid var(--b);color:var(--tm)">No chapters match your filters.</div>';}else{
Object.keys(groups).sort().forEach(function(gk){var chs=groups[gk];var completed=chs.filter(function(ch){return calcChapterPct(ch.id,state)===100}).length;var gpct=Math.round((completed/chs.length)*100);var isOpen=openAccordions[gk]!==false;
h+='<div class="card overflow-hidden"><div class="acc-h" onclick="toggleAccordion(\''+gk+'\')"><div class="flex items-center gap-3"><span class="font-bold text-sm">'+gk+'</span><span class="text-xs" style="color:var(--tm)">'+completed+'/'+chs.length+' complete</span></div><div class="flex items-center gap-4"><div class="w-24 h-1.5 rounded-full overflow-hidden" style="background:var(--bg-c3)"><div class="h-full rounded-full" style="width:'+gpct+'%;background:var(--gold)"></div></div><span class="mono text-xs font-bold" style="color:var(--gold)">'+gpct+'%</span><span style="transform:rotate('+(isOpen?180:0)+'deg)">\u25BC</span></div></div>';
if(isOpen){h+='<div class="p-4 space-y-3">';chs.forEach(function(ch){var cd=getChapterData(ch.id);var pct=calcChapterPct(ch.id,state);var rev=getSpacedRevisionStatus(ch.id,state);var pyq=getPyqSolvedCount(ch.id,state);h+=buildChapterCard(ch,cd,pct,rev,pyq);});h+='</div>';}
h+='</div>';});
}

PYQ_SHIFTS.forEach(function(sh){var s=!!apd?.pyqShifts?.[sh.key];h+='<button onclick="togglePyqShift(\''+activePyqChapterId+'\',\''+sh.key+'\');renderApp();showToast(\''+sh.label+' solved!\',\'emerald\')" class="p-3 rounded-xl border text-left flex items-center justify-between" style="'+(s?'background:var(--gold-muted);border-color:var(--gold-border);font-weight:700':'background:var(--bg-c2);border-color:var(--b)')+'"><div><div class="text-xs font-extrabold">'+sh.year+' '+sh.session+'</div><div class="text-[10px]" style="color:var(--tm)">JEE Main</div></div><div class="stc'+(s?' checked cp':'')+'">'+(s?'\u2713':'')+'</div></button>';});
h+='</div>';
h+='<div class="pt-4 text-right"><button onclick="activePyqChapterId=null;renderApp()" class="btn-gold">Done</button></div></div></div>';
}
h+='</div>';
return h;
}
function toggleAccordion(key){openAccordions[key]=openAccordions[key]===false?true:false;renderApp()}
function toggleFormulaDrawer(id){const cd=getChapterData(id);cd._formulaOpen=!cd._formulaOpen;renderApp()}
function saveFormulaNote(id,val){const cd=getChapterData(id);cd._formulaNote=val;scheduleSave()}
function bulkMark(stage){const chs=activeSubject==='physics'?PHYSICS_CHAPTERS:activeSubject==='chemistry'?CHEMISTRY_CHAPTERS:MATHEMATICS_CHAPTERS;chs.forEach(ch=>{const cd=getChapterData(ch.id);if(!cd.stages[stage])toggleStage(ch.id,stage)});renderApp();showToast('Marked '+stage+' done','emerald')}
function bulkClearBacklog(){const chs=activeSubject==='physics'?PHYSICS_CHAPTERS:activeSubject==='chemistry'?CHEMISTRY_CHAPTERS:MATHEMATICS_CHAPTERS;chs.forEach(ch=>{const cd=getChapterData(ch.id);if(cd.backlog)toggleBacklog(ch.id)});renderApp();showToast('Cleared backlogs','emerald')}

function renderFP(){return '<div class="space-y-6"><h2 class="text-xl font-extrabold">\uD83D\uDE80 Focus Portal</h2><div class="card p-5 space-y-3"><div class="flex items-center gap-3 flex-wrap sm:flex-nowrap"><input id="focus-url" type="url" class="inp flex-1" value="'+(state.focusUrl||'https://www.pw.live/study-v2/batches')+'"><button onclick="launchFocus()" class="btn-gold">\uD83D\uDE80 Launch</button><button onclick="toggleFocusFullscreen()" class="btn-ghost">'+(focusIsFullscreen?'\uD83D\uDD3D Exit':'🔼 Full')+'</button><a href="'+transformUrl(document.getElementById('focus-url')?.value||'')+'" target="_blank" rel="noopener noreferrer" class="btn-ghost">\u2197\uFE0F Pop-Out</a></div></div>'+(focusTimerId!==null?'<div class="card p-4 flex items-center justify-between gap-4 flex-wrap" style="border-color:var(--gold-border);background:var(--gold-muted)"><div class="flex items-center gap-4"><span class="w-3 h-3 rounded-full" style="background:'+(focusIsPaused?'var(--warning)':'var(--success)')+';animation:'+(focusIsPaused?'pulse 2s infinite':'ping 1s infinite')+'"></span><div><div class="flex items-center gap-2"><span class="text-[10px] font-bold uppercase" style="color:var(--tm)">'+(focusIsPaused?'PAUSED':'ACTIVE')+'</span>'+(focusIsPaused?'<span class="chip" style="background:var(--gold-muted);color:var(--warning)">\u2615 Break: '+formatBreak(focusBreakMs)+'</span>':'')+'</div><div class="mono text-2xl font-black" style="color:var(--gold)">'+formatTimer(focusElapsedMs)+'</div></div></div><div class="flex items-center gap-3"><button onclick="toggleFocusPause()" class="btn-ghost">'+(focusIsPaused?'\u25B6\uFE0F Resume':'⏸️ Pause')+'</button><button onclick="endFocusSession()" class="btn-danger">\uD83D\uDED1 End & Save</button></div></div>':'')+

function transformUrl(raw){if(!raw)return'about:blank';let url=raw.trim();if(!url.startsWith('http://')&&!url.startsWith('https://'))url='https://'+url;try{const u=new URL(url);if(u.hostname.includes('youtube.com')&&u.searchParams.get('v'))return'https://www.youtube.com/embed/'+u.searchParams.get('v')+'?autoplay=1';if(u.hostname.includes('youtu.be')){const id=u.pathname.replace('/','');if(id)return'https://www.youtube.com/embed/'+id+'?autoplay=1'}}catch(e){}return url}

function handleSaveSettings(e){e.preventDefault();updateDates({m1:document.getElementById('set-m1').value,m2:document.getElementById('set-m2').value,ad:document.getElementById('set-ad').value});updateSettings({dt:parseInt(document.getElementById('set-dt').value)||8,tt:parseInt(document.getElementById('set-tt').value)||200});showToast('Settings saved!','emerald');renderApp()}
function handleExport(){const blob=new Blob([exportData()],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='jee_backup_'+getLocalDateString()+'.json';a.click();URL.revokeObjectURL(url);showToast('Backup exported!','emerald')}
function handleImport(e){const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{const c=ev.target?.result;if(c&&importData(c)){showToast('Import successful!','emerald');renderApp()}else showToast('Invalid backup file','rose')};reader.readAsText(file)}
// ============================================================
// COMMAND PALETTE
// ============================================================
function toggleCommandPalette(){isCommandPaletteOpen=!isCommandPaletteOpen;renderApp()}
function renderCP(){return'<div class="modal-overlay" onclick="toggleCommandPalette()"><div class="modal-content max-w-2xl" onclick=\'event.stopPropagation()\'><div class="flex items-center gap-3 px-4 py-3.5 border-b" style="border-color:var(--b)"><span>\uD83D\uDD0D</span><input id="cmd-input" type="text" autofocus class="inp flex-1" oninput="filterCommands()" placeholder="Type command or chapter..."><button onclick="toggleCommandPalette()" style="color:var(--tm)">\u2715</button></div><div id="cmd-results" class="max-h-96 overflow-y-auto p-2 space-y-1"></div><div class="px-4 py-2.5 border-t flex items-center justify-between text-[11px]" style="background:var(--bg-c2);border-color:var(--b);color:var(--tm)"><span>Use \u2191\u2193 to navigate</span><span>ESC to exit</span></div></div></div>'}
function filterCommands(){const q=(document.getElementById('cmd-input')?.value||'').toLowerCase(),tabs=[{id:'syllabus',label:'Go to Syllabus',icon:'\uD83D\uDCD6'},{id:'backlog',label:'Backlog Manager',icon:'\uD83D\uDCCC'},{id:'tests',label:'Mock Tests',icon:'\uD83C\uDFAF'},{id:'mistakes',label:'Mistake Vault',icon:'\u26A0\uFE0F'},{id:'goals',label:'Subject Goals',icon:'\uD83C\uDFAF'},{id:'badges',label:'Badges',icon:'\uD83C\uDFC6'},{id:'study',label:'Study Hours',icon:'\u23F0'},{id:'focus',label:'Focus Portal',icon:'\uD83D\uDE80'},{id:'settings',label:'Settings',icon:'\u2699\uFE0F'}];const chs=ALL_CHAPTERS.filter(c=>chapterMatchesSearch(c.name,q)).slice(0,8),mt=tabs.filter(t=>t.label.toLowerCase().includes(q));const r=document.getElementById('cmd-results');if(!r)return;r.innerHTML='';if(!mt.length&&!chs.length){r.innerHTML='<div class="p-8 text-center text-xs" style="color:var(--tm)">No results.</div>';return}mt.forEach(t=>{const b=document.createElement('button');b.className='w-full text-left px-3 py-2.5 rounded-xl flex items-center justify-between text-xs font-semibold hover:bg-[var(--bg-c2)]';b.innerHTML='<div class="flex items-center gap-3"><span>'+t.icon+'</span><span>'+t.label+'</span></div><span style="color:var(--tm)">\u21B5</span>';b.onclick=()=>{activeTab=t.id;isCommandPaletteOpen=false;renderApp()};r.appendChild(b)});chs.forEach(ch=>{const b=document.createElement('button');b.className='w-full text-left px-3 py-2.5 rounded-xl flex items-center justify-between text-xs font-semibold hover:bg-[var(--bg-c2)]';b.innerHTML='<div class="flex items-center gap-3"><span class="font-bold text-[10px] uppercase" style="color:var(--ts)">'+ch.id.slice(0,3)+'</span><div><div>'+ch.name+'</div><div class="text-[10px]" style="color:var(--tm)">Class '+ch.cls+'</div></div></div><span class="text-[10px] px-2 py-0.5 rounded" style="background:var(--gold-muted);color:var(--gold)">View</span>';b.onclick=()=>{activeTab='syllabus';selectedChapterId=ch.id;isCommandPaletteOpen=false;renderApp()};r.appendChild(b)})}
// ============================================================
// QUICK LOG
// ============================================================
function openQuickLog(){isQuickLogOpen=true;renderApp()}
function renderQL(){return'<div class="modal-overlay" onclick="closeQuickLog()"><form onsubmit="handleQuickLogSubmit(event)" class="modal-content max-w-md space-y-4" onclick=\'event.stopPropagation()\'><div class="flex items-center justify-between"><h3 class="text-base font-extrabold" style="color:var(--info)">\u23F0 Quick Log</h3><button type="button" onclick="closeQuickLog()" style="color:var(--tm)">\u2715</button></div><div><input id="ql-hours" type="number" step="0.5" min="0" max="24" class="inp" autofocus placeholder="Hours"></div><div><input id="ql-qs" type="number" min="0" class="inp" placeholder="Questions"></div><div><input id="ql-notes" class="inp" placeholder="Notes"></div><div class="flex justify-end gap-3 pt-2"><button type="button" onclick="closeQuickLog()" class="btn-ghost">Cancel</button><button type="submit" class="btn-gold">\u2713 Log</button></div></form></div>'}
function closeQuickLog(){isQuickLogOpen=false;renderApp()}
function handleQuickLogSubmit(e){e.preventDefault();const hrs=parseFloat(document.getElementById('ql-hours').value)||0,qs=parseInt(document.getElementById('ql-qs').value)||0;if(hrs<=0&&qs<=0){showToast('Enter hours or questions','rose');return}logStudySession({date:getLocalDateString(),lc:0,pr:hrs,tot:hrs,qs,no:document.getElementById('ql-notes').value.trim()||'Quick Logged'});showToast(hrs+'h logged! +100 XP','emerald');closeQuickLog()}
// ============================================================
// CHARTS (BUG 5 FIX: safe initialization with empty data guards)
// ============================================================
function initCharts(){
const tc=document.documentElement.classList.contains('light')?'#64748b':'#a1a1aa',gc=document.documentElement.classList.contains('light')?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.05)';
const trend=document.getElementById('trend-chart');if(trend){if(trendChart)trendChart.destroy();const sorted=[...state.tests].sort((a,b)=>new Date(a.date)-new Date(b.date));trendChart=new Chart(trend,{type:'line',data:{labels:sorted.map(t=>t.name||t.date)||['No data'],datasets:[{label:'Score',data:sorted.map(t=>t.to)||[0],borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.1)',tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:tc,font:{size:10}},grid:{display:false}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},suggestedMin:0,suggestedMax:300}},plugins:{legend:{display:false}}}})}
const radar=document.getElementById('radar-chart');if(radar){if(radarChart)radarChart.destroy();const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;radarChart=new Chart(radar,{type:'radar',data:{labels:['Physics','Chemistry','Math'],datasets:[{label:'Avg',data:[avg(state.tests.map(t=>t.ph||0)),avg(state.tests.map(t=>t.ch||0)),avg(state.tests.map(t=>t.ma||0))],backgroundColor:'rgba(201,168,76,0.25)',borderColor:'#c9a84c'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{ticks:{color:tc,backdropColor:'transparent',font:{size:9}},grid:{color:gc},pointLabels:{color:tc,font:{size:10}}}}}})}
const bar=document.getElementById('bar-chart');if(bar){if(barChart)barChart.destroy();const dates=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(getLocalDateString(d))}const totals=dates.map(d=>{const l=state.studyLogs.find(l=>l.date===d);return l?l.tot||0:0}),dt=state.settings.dt||8;barChart=new Chart(bar,{type:'bar',data:{labels:dates.map(d=>d.slice(5)),datasets:[{label:'Hours',data:totals,backgroundColor:totals.map(v=>v>=dt?'rgba(74,158,122,0.7)':'rgba(91,143,168,0.6)'),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{display:false}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},suggestedMin:0,suggestedMax:dt*1.25||10}}}})}
const goals=document.getElementById('goals-chart');if(goals){if(goalsChart)goalsChart.destroy();const sorted=[...state.tests].sort((a,b)=>new Date(a.date)-new Date(b.date));goalsChart=new Chart(goals,{type:'line',data:{labels:sorted.map(t=>t.name||t.date)||['No data'],datasets:[{label:'Physics',data:sorted.map(t=>t.ph)||[0],borderColor:'#5b8fa8',tension:0.3},{label:'Chemistry',data:sorted.map(t=>t.ch)||[0],borderColor:'#4a9e7a',tension:0.3},{label:'Math',data:sorted.map(t=>t.ma)||[0],borderColor:'#c9a84c',tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:10}}}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},suggestedMin:0,suggestedMax:100}}}})}
}
// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown',(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();toggleCommandPalette()}if((e.metaKey||e.ctrlKey)&&e.key==='l'){e.preventDefault();openQuickLog()}if(e.key==='Escape'){if(isCommandPaletteOpen){isCommandPaletteOpen=false;renderApp()}if(isQuickLogOpen){isQuickLogOpen=false;renderApp()}}});
// ============================================================
// INIT
// ============================================================
initTheme();loadState();sanitizeDates();
BADGE_DEFS.forEach(b=>{if(b.check(state)&&!state.badges[b.id]){state.badges[b.id]=true;scheduleSave()}});
renderApp();
</script>
</body>
