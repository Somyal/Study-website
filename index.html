<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JEE Command Center — Personal Preparation Engine</title>
  <meta name="description" content="Distraction-free personal operating system for JEE Main & Advanced prep: syllabus tracker, mock tests analytics, mistake vault, spaced revision, and study logger."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script>
    (function(){
      const t = localStorage.getItem('jeeCommandCenter_theme') || 'dark';
      if(t === 'light'){
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body class="bg-[#09090b] text-[#f4f4f5] font-sans antialiased min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
